<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InspireMe Quote Generator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="glass">

<h1>✨ InspireMe</h1>

<p class="subtitle">

Daily Quote Generator

</p>

<div class="quoteBox">

<h2 id="quote">

Click Generate to get inspired!

</h2>

<p id="author">

—

</p>

</div>

<button id="generate">

🎲 Generate Quote

</button>

<div class="history">

<h3>

📖 Quote History

</h3>

<ul id="historyList">

</ul>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
